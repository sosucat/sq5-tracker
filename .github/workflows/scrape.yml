name: Scrape Apartment Prices

on:
  schedule:
    # Run daily at 9 AM
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies and run
        run: |
          uv sync
          uv run python ./src/sq5_tracker/__init__.py
